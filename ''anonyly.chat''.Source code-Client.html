<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonyly Chat</title>
    <link rel="icon" href="https://advikchaudhary.com/Images/.''projects''/#Websites-Logos/Anonyly-chat.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap">
    <style>
        :root {
            --color-background: #FFFFFF;
            --color-text: #000000;
        } @media (prefers-color-scheme: dark) {
            :root {
                --color-background: #0C0C0C;
                --color-text: #FFFFFF
            }
        }

        * {
            font-family: 'Roboto Flex', Arial, Helvetica;
            margin: 0; overflow-x: hidden
        } * br {
              display: block; 
              font-size: 0;
              margin-bottom: 1vw
        } * h1 {font-size: 6em; -webkit-text-fill-color: #FF4556; -webkit-text-stroke: 0.1vw var(--color-text)} * h2 {font-size: 4em}
          * p {font-size: 2.5em; line-height: 1}
        
        .header {
            position: fixed; display: absolute; background: linear-gradient(to right, #FF6666, #FF4444);
            width: 100vw; text-align: center
        }

        .messages {
            display: flex;
            width: 98vw;
            padding-top: 8em; margin: 0 0 14vw 0vw; flex-direction: column;
        } .message-others {
            display: inline-block; background-color: #C0C0C0;
            padding: 1vw; border-radius: 2vw;
            max-width: 60vw;
            font-size: 1.5em; color: var(--color-text); text-align: left;
            margin: 1vw 0 0 1vw; align-self: flex-start;
          } .message-yours {
            display: inline-block; background-color: #FF4556;
            max-width: 60vw; border-radius: 2vw;
            font-size: 1.5em; text-align: right;
            padding: 1vw; margin: 1vw 1vw 0 0; align-self: flex-end
          } .message-others img, .message-yours img {
              display: block; border-radius: 1vw;
              width: 58vw; height: auto;
            }

        .message {
            display: flex; position: fixed; background: linear-gradient(to right, #FF6666, #F44F44);
            width: 96vw; border-radius: 2vw;
            gap: 1vw; padding: 1vw 1vw; margin: 0 0 1vw 1vw; align-items: center; left: 0; bottom: 0; z-index: 10;
        } .text-input {
            resize: none; overflow-y: auto;
            width: 90vw; height: 6vw;
            background-color: var(--color-background); border: none; border-radius: 2vw;
            font-size: 2vw; color: var(--color-text); font-style: italic;
            padding: 1vw
          } .text-input::placeholder {color: #C0C0C0}
          .image-input {
              display: flex; background-color: #000000;
              width: 6vw; height: 6vw; border-radius: 50%;
              font-size: 3vw; color: #FFFFFF;
              justify-content: center; align-items: center;
              cursor: pointer; transition: 0.5s background-color ease, 0.5s color ease;
          } .image-input:hover {
              background-color: #FFFFFF;
              color: #000000;
            }
          .send-message {
              display: flex; background-color: #000;
              width: 5vw; height: 5vw; border-radius: 50%;
              font-size: 4vw; color: #FFF;
              justify-content: center; align-items: center;
              cursor: pointer; transition: 0.5s background-color ease, 0.5s color ease;
          } .send-message:hover {
              background-color: #FFFFFF;
              color: #000000;
            } .character-counter {
                position: absolute;
                font-size: 1em; color: #C0C0C0;
                right: 8vw; bottom: 2vw; z-index: 11;
                pointer-events: none
          }

        @media (orientation: portrait) {
            * {
               font-family: 'Roboto Flex', Arial, Helvetica;
                margin: 0; overflow-x: hidden
            } * br {
                display: block; 
                font-size: 0;
                margin-bottom: 1vw
            } * h1 {font-size: 4em; -webkit-text-fill-color: #FF4556; -webkit-text-stroke: 0.1vw var(--color-text)} * h2 {font-size: 4em}
              * p {font-size: 2.5em; line-height: 1}
        
            .header {
                position: fixed; display: absolute; background: linear-gradient(to right, #FF6666, #FF4444);
                width: 100vw; text-align: center
            }

            .messages {
                display: flex;
                width: 98vw;
                padding-top: 5em; margin: 0 0 32vw 0; flex-direction: column;
            } .message-others {
                display: inline-block; background-color: #C0C0C0;
                padding: 1vw; border-radius: 2vw;
                max-width: 60vw;
                font-size: 1.5em; color: var(--color-text); text-align: left;
                margin: 1vw 0 0 1vw; align-self: flex-start;
              } .message-yours {
                display: inline-block; background-color: #FF4556;
                max-width: 60vw; border-radius: 2vw;
                font-size: 1.5em; text-align: right;
                padding: 1vw; margin: 1vw 1vw 0 0; align-self: flex-end
              } .message-others img, .message-yours img {
                  display: block; border-radius: 1vw;
                  width: 58vw; height: auto;
                }

            .message {
                display: flex; position: fixed; background: linear-gradient(to right, #FF6666, #FF4444);
                width: 96vw; border-radius: 2vw;
                gap: 1vw; padding: 1vw 1vw; justify-content: space-between; align-items: center; left: 0; bottom: 0; z-index: 10;
            } .text-input {
                resize: none; overflow-y: auto;
                width: 85vw; height: 25vw;
                background-color: var(--color-background); border: none; border-radius: 2vw;
                font-size: 5vw; color: var(--color-text); font-style: italic;
                padding: 1vw
              } .text-input::placeholder {color: #C0C0C0}
              .image-input {
                  display: flex; background-color: #000000;
                  width: 10vw; height: 10vw; border-radius: 50%;
                  font-size: 5vw; color: #FFFFFF;
                  justify-content: center; align-items: center;
                  cursor: pointer; transition: 0.5s background-color ease, 0.5s color ease;
              } .image-input:hover {
                  background-color: #FFFFFF;
                  color: #000;
                }
              .send-message {
                  display: flex; background-color: #000000;
                  width: 10vw; height: 10vw; border-radius: 50%;
                  font-size: 8vw; color: #FFF;
                  justify-content: center; align-items: center;
                  cursor: pointer; transition: 0.5s background-color ease, 0.5s color ease;
              } .send-message:hover {
                  background-color: #FFFFFF;
                  color: #000;
                } .character-counter {
                    position: absolute;
                    font-size: 1em; color: #C0C0C0;
                    right: 14vw; bottom: 2vw; z-index: 11;
                    pointer-events: none
              }
        }
    </style>
</head>

<body style="background-color: var(--color-background);">
    <div class="header"><h1>ANONYLY CHAT</h1></div>
<main>
    <div class="messages" id="messages"></div>

    <div class="message">
        <input type="file" id="attachment" accept="image/*" style="display: none">
        <div class="image-input" id="image_input">🖼</div>
        <textarea class="text-input" id="text_input" rows="1" placeholder="Message..." maxlength="1024"></textarea><div id="character_counter" class="character-counter">0/1024</div>
        <div class="send-message" id="send_message">➜</div>
    </div>
</main>
</body>
<script>
    var ID = null;
    const SERVER = new WebSocket("wss://websites-anonyly-chat.onrender.com");
    const NOTIFICATION_AUDIO = new Audio("Assets/Notification.mp3");
    var attachment_limit = 1;

    const text_input = document.getElementById("text_input"); const image_input = document.getElementById("image_input"); const attachment = document.getElementById("attachment"); const send_message = document.getElementById("send_message")
    var messages = []; var image = {name: "", picture: "", type: ""};

    text_input.addEventListener("input", () => {document.getElementById("character_counter").textContent = `${text_input.value.length}/1024`});
    text_input.addEventListener("keydown", (event) => {if (event.key === "Enter" && !event.shiftKey) {event.preventDefault(); send_message.click()}});
    image_input.onclick = () => {
        if (attachment_limit === 0) {alert("You can only send 1 attachment per 30 seconds"); return};
        attachment.click()
    }
    attachment.addEventListener("change", async function() {
        if (this.files && this.files[0]) {
            if (this.files[0].size > 5*1024*1024) {alert("File can not be larger than 5MB"); this.value = ""; return}
            image = {
                name: this.files[0].name,
                picture: await encodeFile(this.files[0]),
                type: this.files[0].type
            }
            image_input.textContent = "✓"; image_input.style.opacity = 0.5; image_input.style.cursor = "default"
        }
    });
    send_message.onclick = () => {
        if (!text_input.value.trim() && !image.picture) {return};

        if (image.picture) {attachment_limit = 0; setTimeout(() => {attachment_limit = 1; image_input.style.opacity = 1; image_input.style.cursor = "pointer"}, 30000)};
        let message = {text: text_input.value, image: image};
        SERVER.send(JSON.stringify(message)); text_input.value = ""; attachment.value = ""; image = {name: "", picture: "", type: ""};

        text_input.value.length = 0; image_input.textContent = "🖼";
        send_message.style.cursor = "default"; send_message.style.opacity = "0.5"; setTimeout(() => {send_message.style.cursor = "pointer"; send_message.style.opacity = "1";}, 1000);
    };

    function encodeFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file); 
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }
    SERVER.onmessage = (event) => {
        if (ID === null) {ID = event.data; return}
        updates = JSON.parse(event.data)
        old_messages = updates["old"]; new_messages = updates["new"]
        if (messages.length === 0) {messages.push(...old_messages, ...new_messages); render_messages(messages); return}
        new_messages.forEach(message => {if (message.ID != ID) {NOTIFICATION_AUDIO.play().catch(() => console.log("Notification failed: Audio blocked")); return}})
        old_messages.forEach(old_message => {let old_message_index = messages.findIndex(message => message.text === old_message.text && message.ID === old_message.ID); if (old_message_index !== -1) {messages.splice(old_message_index, 1)}})
        messages.push(...new_messages)
        render_messages(messages)
    };
    function render_messages(messages) {
        const messages_container = document.getElementById("messages");
        messages_container.innerHTML = '';
        messages.forEach(message => {
            let message_div = document.createElement("div");
            message_div.className = (message.ID == ID) ? "message-yours" : "message-others"; message_div.textContent = message.text;
            if (message.image && message.image.picture) {
                let image_img = document.createElement("img");
                image_img.src = message.image.picture;
                message_div.appendChild(image_img)
            }
            messages_container.appendChild(message_div)
        })
    }
</script>

</html>
